name: security-audit

# Fails on NEW high/critical PRODUCTION dependency advisories.
# Documented, reachability-reviewed exceptions live in audit-ci.jsonc +
# SECURITY.md; a new advisory (new GHSA id) is NOT allowlisted and fails here.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # --ignore-scripts skips the embedding-model prewarm postinstall: the gate
      # only needs the resolved dependency tree, not a runnable app.
      - run: npm install --ignore-scripts
      - run: npm run audit:ci
